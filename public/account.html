<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Account</title>
    <link rel="stylesheet" href="main-page.css">
    <link rel="stylesheet" href="account.css">
</head>
<body>
    <div class="content-wrapper">
        <div class="sidebar">
            <img src="images/task-manager-logo.png" alt="Task Manager Logo" class="sidebar-logo">
            <ul>
                <li><a href="main-page.html">Home</a></li>
                <li><a href="account.html">Account</a></li>
                <li><a href="#" id="logoutBtn">Logout</a></li>
            </ul>
        </div>

        <div class="account-container">
            <h1>Account</h1>
            <div class="account-section">
                <h2>Username</h2>
                <p><span id="username"></span></p>

                <h2>Change Password</h2>
                <form id="changePasswordForm">
                    <div class="form-group">
                        <label for="currentPassword">Current Password</label>
                        <input type="password" id="currentPassword" placeholder="Current Password" required>
                    </div>
                    <div class="form-group">
                        <label for="newPassword">New Password</label>
                        <input type="password" id="newPassword" placeholder="New Password" required>
                    </div>
                    <div class="button-group">
                        <button id="submit-button" type="submit">Change Password</button>
                        <p id="change-password-error" class="error-message"></p>
                        <p id="change-password-success" class="success-message"></p>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <script src="account.js"></script>
</body>
</html>
